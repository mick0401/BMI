<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業 BMI 健康計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .result-badge {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">健康管理 BMI</h1>
            <p class="text-gray-500">掌握身體數據，維持理想生活</p>
        </div>

        <div class="space-y-6">
            <!-- 身高輸入 -->
            <div>
                <label for="height" class="block text-sm font-medium text-gray-700 mb-1">身高 (cm)</label>
                <input type="number" id="height" placeholder="例如: 175" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition">
            </div>

            <!-- 體重輸入 -->
            <div>
                <label for="weight" class="block text-sm font-medium text-gray-700 mb-1">體重 (kg)</label>
                <input type="number" id="weight" placeholder="例如: 70" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-400 focus:border-transparent outline-none transition">
            </div>

            <!-- 計算按鈕 -->
            <button onclick="calculateBMI()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition transform hover:scale-[1.02] active:scale-95 shadow-lg">
                立即計算
            </button>

            <!-- 結果顯示區塊 (預設隱藏) -->
            <div id="resultCard" class="hidden mt-8 p-6 rounded-2xl bg-gray-50 border border-gray-100 text-center">
                <p class="text-gray-600 text-sm mb-1">您的 BMI 指數為</p>
                <h2 id="bmiValue" class="text-4xl font-black text-blue-600 mb-3">22.5</h2>
                <div id="statusBadge" class="inline-block px-4 py-1 rounded-full text-sm font-bold mb-4">
                    體重正常
                </div>
                <p id="adviceText" class="text-gray-500 text-sm italic"></p>
            </div>
        </div>

        <!-- 參考表格 -->
        <div class="mt-8 border-t pt-6">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">BMI 標準參考表</h3>
            <div class="grid grid-cols-2 gap-2 text-xs text-gray-500">
                <div class="flex items-center"><span class="w-3 h-3 bg-blue-400 rounded-full mr-2"></span> 過輕: < 18.5</div>
                <div class="flex items-center"><span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span> 正常: 18.5 - 24</div>
                <div class="flex items-center"><span class="w-3 h-3 bg-yellow-500 rounded-full mr-2"></span> 過重: 24 - 27</div>
                <div class="flex items-center"><span class="w-3 h-3 bg-red-500 rounded-full mr-2"></span> 肥胖: > 27</div>
            </div>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('weight');
            const resultCard = document.getElementById('resultCard');
            const bmiDisplay = document.getElementById('bmiValue');
            const statusBadge = document.getElementById('statusBadge');
            const adviceText = document.getElementById('adviceText');

            const height = parseFloat(heightInput.value);
            const weight = parseFloat(weightInput.value);

            if (!height || !weight || height <= 0 || weight <= 0) {
                alertBox("請輸入正確的身高與體重數據");
                return;
            }

            // BMI 公式 = 體重(kg) / (身高(m) * 身高(m))
            const heightInMeters = height / 100;
            const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);

            // 更新 UI
            bmiDisplay.innerText = bmi;
            resultCard.classList.remove('hidden');

            // 判斷狀態
            let status = "";
            let colorClass = "";
            let advice = "";

            if (bmi < 18.5) {
                status = "體重過輕";
                colorClass = "bg-blue-100 text-blue-700";
                advice = "建議攝取均衡營養，適度增加熱量攝取。";
            } else if (bmi < 24) {
                status = "理想體重";
                colorClass = "bg-green-100 text-green-700";
                advice = "恭喜！請繼續維持良好的飲食與運動習慣。";
            } else if (bmi < 27) {
                status = "體重過重";
                colorClass = "bg-yellow-100 text-yellow-700";
                advice = "請注意飲食熱量，增加日常活動量。";
            } else {
                status = "肥胖警示";
                colorClass = "bg-red-100 text-red-700";
                advice = "建議諮詢營養師或醫師，規劃減重計劃。";
            }

            statusBadge.innerText = status;
            statusBadge.className = `inline-block px-4 py-1 rounded-full text-sm font-bold mb-4 ${colorClass}`;
            adviceText.innerText = advice;
        }

        function alertBox(msg) {
            // 簡易的非阻斷式提示
            const div = document.createElement('div');
            div.className = "fixed top-5 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-2xl z-50 transition-opacity";
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                setTimeout(() => div.remove(), 500);
            }, 2000);
        }
    </script>
</body>
</html>
